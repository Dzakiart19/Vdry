<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <meta name="description" content="Vidorey 3 — video harian terbaru, cari dan tonton langsung tanpa daftar." />
  <title>Vidorey 3</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/style.css" />
  <link rel="icon" type="image/png" href="/logo.png" />
</head>
<body class="rb-page">

<!-- ─── TOPBAR ─── -->
<header class="topbar">
  <div class="brand ps-wrapper" id="platformSwitcher">
    <button class="ps-trigger" id="psTrigger" aria-haspopup="listbox" aria-expanded="false">
      <div class="brand-icon">
        <img src="/logo.png" alt="Vidorey" class="brand-logo-img" />
      </div>
      <span class="brand-name">Vidorey</span>
      <svg class="ps-chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
        <polyline points="6 9 12 15 18 9"/>
      </svg>
    </button>
    <div class="ps-menu hidden" id="psMenu" role="listbox">
      <a class="ps-item" href="/" role="option">
        <div class="ps-avatar">V</div>
        <div class="ps-info">
          <span class="ps-name">Vidorey 1</span>
          <span class="ps-desc">Folder video · streaming</span>
        </div>
      </a>
      <a class="ps-item" href="/rb" role="option">
        <div class="ps-avatar ps-avatar-rb">R</div>
        <div class="ps-info">
          <span class="ps-name">Vidorey 2</span>
          <span class="ps-desc">Video harian · cari &amp; tonton</span>
        </div>
      </a>
      <a class="ps-item ps-active" href="/yb" role="option" aria-selected="true">
        <div class="ps-avatar ps-avatar-yb">Y</div>
        <div class="ps-info">
          <span class="ps-name">Vidorey 3</span>
          <span class="ps-desc">Video harian · cari &amp; tonton</span>
        </div>
        <svg class="ps-check" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <polyline points="20 6 9 17 4 12"/>
        </svg>
      </a>
    </div>
  </div>
</header>

<!-- ─── SEARCH BAR ─── -->
<div class="rb-searchbar">
  <form id="ybSearchForm" autocomplete="off">
    <input
      id="ybSearchInput"
      class="rb-search-input"
      type="search"
      placeholder="Cari video…"
      maxlength="150"
    />
    <button type="submit" class="rb-search-btn">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>
      Cari
    </button>
  </form>
</div>

<!-- ─── SHELL ─── -->
<div class="shell">
  <main class="content" id="ybContent">

    <!-- Search heading -->
    <div id="ybSearchHeading" class="rb-search-heading"></div>

    <div id="ybLoadingState" class="state-view hidden">
      <div class="loader"><div class="loader-ring"></div></div>
      <p>Memuat…</p>
    </div>

    <div id="ybErrorState" class="state-view hidden">
      <div class="state-icon error-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/>
          <line x1="12" y1="16" x2="12.01" y2="16"/>
        </svg>
      </div>
      <p id="ybErrorMsg">Terjadi kesalahan.</p>
      <button class="btn-retry" id="ybRetryBtn">Coba lagi</button>
    </div>

    <div id="ybEmptyState" class="state-view hidden">
      <div class="state-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <rect x="2" y="3" width="20" height="14" rx="2"/>
          <line x1="8" y1="21" x2="16" y2="21"/>
          <line x1="12" y1="17" x2="12" y2="21"/>
        </svg>
      </div>
      <p>Tidak ada video ditemukan.</p>
    </div>

    <div id="ybGrid" class="rb-grid"></div>

    <!-- ─── Native Banner Ad ─── -->
    <div class="ad-native-slot">
      <script async="async" data-cfasync="false" src="https://pl28423230.effectivecpmnetwork.com/761a1a8645cd2263043bfeb6f2e87eea/invoke.js"></script>
      <div id="container-761a1a8645cd2263043bfeb6f2e87eea"></div>
    </div>

    <div id="ybPagination" class="pagination hidden"></div>

  </main>
</div>

<!-- ─── PLAYER MODAL ─── -->
<div id="ybPlayerModal" class="modal hidden" role="dialog" aria-modal="true">
  <div class="modal-backdrop" id="ybModalBackdrop"></div>
  <div class="modal-panel">
    <div class="modal-top">
      <div class="modal-meta">
        <h2 id="ybVideoTitle" class="modal-title">—</h2>
        <span id="ybVideoSub" class="modal-sub">Vidorey 3</span>
      </div>
      <button class="modal-close" id="ybModalClose" title="Tutup">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
      </button>
    </div>
    <div class="video-stage rb-video-stage">
      <div id="ybPlayerLoading" class="rb-player-loader">
        <div class="loader-ring"></div>
        <p>Memuat video…</p>
      </div>
      <video
        id="ybVideoEl"
        class="rb-player-video hidden"
        controls
        playsinline
        preload="none"
      ></video>
      <iframe
        id="ybVideoFrame"
        class="rb-player-frame hidden"
        allowfullscreen
        allow="autoplay; fullscreen; picture-in-picture"
        referrerpolicy="no-referrer-when-downgrade"
        frameborder="0"
        scrolling="no"
      ></iframe>
    </div>
  </div>
</div>

<div id="toast" aria-live="polite"></div>

<script src="https://cdn.jsdelivr.net/npm/hls.js@1/dist/hls.min.js"></script>
<script src="/config.js"></script>
<script src="/yb.js"></script>

<!-- ─── Platform Switcher ─── -->
<script>
(function () {
  var trigger = document.getElementById('psTrigger');
  var menu    = document.getElementById('psMenu');
  function open()  { menu.classList.remove('hidden'); trigger.setAttribute('aria-expanded','true'); }
  function close() { menu.classList.add('hidden');    trigger.setAttribute('aria-expanded','false'); }
  trigger.addEventListener('click', function (e) { e.stopPropagation(); menu.classList.contains('hidden') ? open() : close(); });
  document.addEventListener('click', close);
  document.addEventListener('keydown', function (e) { if (e.key === 'Escape') close(); });
})();
</script>

<!-- ─── Adsterra: Popunder ─── -->

</body>
</html>
