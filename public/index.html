<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>Vidorey</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/style.css" />
</head>
<body>

<!-- ─── TOPBAR ─── -->
<header class="topbar">
  <a class="brand" href="javascript:void(0)" id="brandHome">
    <div class="brand-icon">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
    </div>
    <span class="brand-name">Vidorey</span>
  </a>

  <nav class="breadcrumb" id="breadcrumb" aria-label="Navigasi folder"></nav>
</header>

<!-- ─── SHELL ─── -->
<div class="shell">

  <!-- Sidebar -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-inner">

      <div class="add-row">
        <input id="addFolderInput" class="add-input" type="text"
          placeholder="Link atau ID folder…" autocomplete="off" spellcheck="false" />
        <button id="addFolderBtn" class="add-btn" title="Tambah folder">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
            <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
          </svg>
        </button>
      </div>

      <div id="folderList"></div>
    </div>
  </aside>

  <!-- Content -->
  <main class="content" id="content">

    <div id="loadingState" class="state-view hidden">
      <div class="loader">
        <div class="loader-ring"></div>
      </div>
      <p>Memuat…</p>
    </div>

    <div id="errorState" class="state-view hidden">
      <div class="state-icon error-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/>
          <line x1="12" y1="16" x2="12.01" y2="16"/>
        </svg>
      </div>
      <p id="errorMsg">Terjadi kesalahan.</p>
      <button class="btn-retry" onclick="App.retry()">Coba lagi</button>
    </div>

    <div id="emptyState" class="state-view hidden">
      <div class="state-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <path d="M3 7a2 2 0 012-2h4l2 2h8a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V7z"/>
        </svg>
      </div>
      <p>Folder ini kosong.</p>
    </div>

    <div id="mainGrid"></div>

    <div id="pagination" class="pagination hidden"></div>

  </main>
</div>

<!-- ─── PLAYER MODAL ─── -->
<div id="playerModal" class="modal hidden" role="dialog" aria-modal="true">
  <div class="modal-backdrop" id="modalBackdrop"></div>
  <div class="modal-panel">
    <div class="modal-top">
      <div class="modal-meta">
        <h2 id="videoTitle" class="modal-title">—</h2>
        <span id="videoSubtitle" class="modal-sub"></span>
      </div>
      <button class="modal-close" id="modalClose" title="Tutup">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
      </button>
    </div>
    <div class="video-stage">
      <video id="videoPlayer" controls playsinline preload="metadata">
        <p>Browser tidak mendukung video HTML5.</p>
      </video>
    </div>
  </div>
</div>

<div id="toast" aria-live="polite"></div>

<script src="/app.js"></script>
</body>
</html>
