<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>Vidorey</title>
  <link rel="stylesheet" href="/style.css" />
</head>
<body>

<!-- ────── TOPBAR ────── -->
<header class="topbar">
  <div class="topbar-inner">
    <div class="brand">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
      <span>Vidorey</span>
    </div>

    <div class="breadcrumb" id="breadcrumb">
      <span class="bc-item" data-id="">Home</span>
    </div>

    <div class="topbar-right"></div>
  </div>
</header>

<!-- ────── MAIN ────── -->
<main class="shell">

  <!-- Sidebar folders -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-title">Folder</div>

    <!-- Tambah folder -->
    <div class="add-folder-wrap">
      <input id="addFolderInput" class="add-folder-input" type="text"
        placeholder="Paste link / ID folder…" autocomplete="off" />
      <button id="addFolderBtn" class="add-folder-btn" title="Tambah folder">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
        </svg>
      </button>
    </div>

    <div id="folderList" class="folder-list"></div>
  </aside>

  <!-- Content area -->
  <section class="content" id="content">

    <!-- Loading -->
    <div id="loadingState" class="state-box hidden">
      <div class="spinner"></div>
      <p>Memuat…</p>
    </div>

    <!-- Error -->
    <div id="errorState" class="state-box hidden">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
      <p id="errorMsg">Terjadi kesalahan.</p>
      <button class="btn" onclick="App.retry()">Coba lagi</button>
    </div>

    <!-- Video grid -->
    <div id="videoGrid" class="video-grid"></div>

    <!-- Empty -->
    <div id="emptyState" class="state-box hidden">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M9 21V9"/></svg>
      <p>Folder ini kosong.</p>
    </div>

    <!-- Pagination -->
    <div id="pagination" class="pagination hidden"></div>

  </section>
</main>

<!-- ────── PLAYER MODAL ────── -->
<div id="playerModal" class="modal hidden">
  <div class="modal-overlay" onclick="App.closePlayer()"></div>
  <div class="modal-box">
    <div class="modal-header">
      <h2 id="videoTitle" class="modal-title">Video</h2>
      <button class="close-btn" onclick="App.closePlayer()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div class="video-wrap">
      <video id="videoPlayer" controls playsinline preload="metadata">
        <p>Browser Anda tidak mendukung video HTML5.</p>
      </video>
    </div>
    <div class="modal-footer">
      <span id="videoSubtitle" class="modal-subtitle"></span>
    </div>
  </div>
</div>

<script src="/app.js"></script>
</body>
</html>
