<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>Vidorey</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/style.css" />
  <link rel="icon" type="image/png" href="/logo.png" />
</head>
<body>

<!-- ─── TOPBAR ─── -->
<header class="topbar">
  <a class="brand" href="javascript:void(0)" id="brandHome">
    <div class="brand-icon">
      <img src="/logo.png" alt="Vidorey" class="brand-logo-img" />
    </div>
    <span class="brand-name">Vidorey</span>
  </a>

  <nav class="breadcrumb" id="breadcrumb" aria-label="Navigasi folder"></nav>

  <nav class="rb-topnav" aria-label="Navigasi platform">
    <a class="rb-topnav-link" href="/rb">Platform 2</a>
  </nav>
</header>

<!-- ─── SHELL ─── -->
<div class="shell">

  <!-- Sidebar -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-inner">

      <div class="add-row">
        <input id="addFolderInput" class="add-input" type="text"
          placeholder="Link atau ID folder…" autocomplete="off" spellcheck="false" />
        <button id="addFolderBtn" class="add-btn" title="Tambah folder">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
            <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
          </svg>
        </button>
      </div>

      <div id="folderList"></div>
    </div>
  </aside>

  <!-- Content -->
  <main class="content" id="content">

    <div id="loadingState" class="state-view hidden">
      <div class="loader">
        <div class="loader-ring"></div>
      </div>
      <p>Memuat…</p>
    </div>

    <div id="errorState" class="state-view hidden">
      <div class="state-icon error-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/>
          <line x1="12" y1="16" x2="12.01" y2="16"/>
        </svg>
      </div>
      <p id="errorMsg">Terjadi kesalahan.</p>
      <button class="btn-retry" onclick="App.retry()">Coba lagi</button>
    </div>

    <div id="emptyState" class="state-view hidden">
      <div class="state-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <path d="M3 7a2 2 0 012-2h4l2 2h8a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V7z"/>
        </svg>
      </div>
      <p>Folder ini kosong.</p>
    </div>

    <div id="mainGrid"></div>

    <!-- ─── Native Banner Ad ─── -->
    <div class="ad-native-slot">
      <script async="async" data-cfasync="false" src="https://pl28423230.effectivecpmnetwork.com/761a1a8645cd2263043bfeb6f2e87eea/invoke.js"></script>
      <div id="container-761a1a8645cd2263043bfeb6f2e87eea"></div>
    </div>

    <div id="pagination" class="pagination hidden"></div>

  </main>
</div>

<!-- ─── WELCOME POPUP ─── -->
<div id="welcomePopup" class="welcome-overlay hidden" role="dialog" aria-modal="true" aria-labelledby="welcomeTitle">
  <div class="welcome-box">
    <div class="welcome-header">
      <div class="welcome-icon">
        <img src="/logo.png" alt="Vidorey" class="brand-logo-img" />
      </div>
      <div>
        <h2 id="welcomeTitle" class="welcome-title">Selamat Datang di Vidorey</h2>
        <p class="welcome-sub">Platform video gratis, update setiap hari</p>
      </div>
    </div>

    <ul class="welcome-list">
      <li>
        <span class="wl-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M12 2a10 10 0 100 20A10 10 0 0012 2z"/><path d="M12 8v4l3 3"/></svg>
        </span>
        <span><strong>Gratis</strong> — tidak perlu daftar atau bayar apapun</span>
      </li>
      <li>
        <span class="wl-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 11-2.12-9.36L23 10"/></svg>
        </span>
        <span><strong>Update setiap hari</strong> — konten baru selalu hadir</span>
      </li>
      <li>
        <span class="wl-icon">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
        </span>
        <span><strong>Enjoy nonton</strong> — putar langsung, tanpa ribet</span>
      </li>
    </ul>

    <div class="welcome-footer">
      <label class="welcome-check">
        <input type="checkbox" id="welcomeDontShow" />
        <span>Jangan tampilkan lagi</span>
      </label>
      <button id="welcomeClose" class="welcome-btn">Mulai Nonton →</button>
    </div>
  </div>
</div>

<!-- ─── PLAYER MODAL ─── -->
<div id="playerModal" class="modal hidden" role="dialog" aria-modal="true">
  <div class="modal-backdrop" id="modalBackdrop"></div>
  <div class="modal-panel">
    <div class="modal-top">
      <div class="modal-meta">
        <h2 id="videoTitle" class="modal-title">—</h2>
        <span id="videoSubtitle" class="modal-sub"></span>
      </div>
      <button class="modal-close" id="modalClose" title="Tutup">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
      </button>
    </div>
    <div class="video-stage">
      <video id="videoPlayer" controls playsinline preload="metadata">
        <p>Browser tidak mendukung video HTML5.</p>
      </video>
    </div>
  </div>
</div>

<div id="toast" aria-live="polite"></div>

<script src="/config.js"></script>
<script src="/app.js"></script>

<!-- ─── Welcome Popup Logic ─── -->
<script>
(function () {
  const STORAGE_KEY = 'vidorey_welcome_hidden_until';
  const popup    = document.getElementById('welcomePopup');
  const closeBtn = document.getElementById('welcomeClose');
  const checkbox = document.getElementById('welcomeDontShow');

  function shouldShow() {
    const until = localStorage.getItem(STORAGE_KEY);
    if (!until) return true;
    return Date.now() > parseInt(until, 10);
  }

  function closePopup() {
    popup.classList.add('hidden');
    if (checkbox.checked) {
      const sevenDays = Date.now() + 7 * 24 * 60 * 60 * 1000;
      localStorage.setItem(STORAGE_KEY, sevenDays);
    }
  }

  if (shouldShow()) {
    setTimeout(() => popup.classList.remove('hidden'), 600);
  }

  closeBtn.addEventListener('click', closePopup);
  popup.addEventListener('click', function (e) {
    if (e.target === popup) closePopup();
  });
})();
</script>

<!-- ─── Adsterra: Popunder (background tab, tidak ganggu video) ─── -->

<!-- ─── Adsterra: Social Bar (floating kecil di pojok) ─── -->
<script src="https://pl28427857.effectivecpmnetwork.com/96/e9/ff/96e9ff95727320b49c1ea1aa80add9b6.js"></script>
</body>
</html>
