        </svg>

    </div>
    <div class="video-stage rb-video-stage">
      <div id="rbPlayerLoading" class="rb-player-loader">
        <div class="loader-ring"></div>
        <p>Memuat video…</p>
      </div>
      <video
        id="rbVideoEl"
        class="rb-player-video hidden"
        controls
        playsinline
        preload="none"
      ></video>
      <iframe
        id="rbVideoFrame"
        class="rb-player-frame hidden"
        allowfullscreen
        allow="autoplay; fullscreen; picture-in-picture"
        referrerpolicy="no-referrer-when-downgrade"
        frameborder="0"
        scrolling="no"
      ></iframe>
    </div>
  </div>

<!-- ─── Nav Drawer ─── -->
<script>
(function () {
  var burger  = document.getElementById('navBurger');
  var drawer  = document.getElementById('navDrawer');
  var overlay = document.getElementById('navOverlay');
  var btnClose = document.getElementById('navClose');
  function openDrawer()  { drawer.classList.add('open');    overlay.classList.add('open');    burger.setAttribute('aria-expanded','true'); }
  function closeDrawer() { drawer.classList.remove('open'); overlay.classList.remove('open'); burger.setAttribute('aria-expanded','false'); }
  burger.addEventListener('click',   function (e) { e.stopPropagation(); openDrawer(); });
  overlay.addEventListener('click',  closeDrawer);
  btnClose.addEventListener('click', closeDrawer);
  document.addEventListener('keydown', function (e) { if (e.key === 'Escape') closeDrawer(); });
})();
</script>
