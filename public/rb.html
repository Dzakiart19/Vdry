<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>Vidorey 2</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/style.css" />
  <link rel="icon" type="image/png" href="/logo.png" />
  <style>
    /* ══ RB: Natural page scroll (tidak pakai internal container scroll) ══
       style.css global punya body { overflow:hidden; height:100% } untuk P1.
       Tag <style> ini datang setelah linked stylesheet, jadi override via
       cascade order — TIDAK pakai !important agar JS modal scroll-lock
       (document.body.style.overflow = 'hidden') tetap bisa override stylesheet. */
    html, body {
      overflow-y: auto;
      height: auto;
      min-height: 100vh;
    }

    /* Modal scroll-lock class — dipakai JS sebagai alternatif inline style */
    body.modal-open {
      overflow: hidden !important;
    }

    /* Shell: tidak fixed-height, ikut konten */
    .shell {
      display: block;
      height: auto;
      min-height: calc(100vh - var(--topbar-h));
      padding-top: 0;
    }

    /* Content: tidak punya scroll sendiri, ikut page scroll */
    .content {
      flex: unset;
      height: auto;
      overflow: visible;
      margin: 0;
      max-width: 100%;
      padding: 0 0 60px;
    }

    /* ── Search bar — sticky di bawah topbar ── */
    .rb-searchbar {
      position: sticky;
      top: var(--topbar-h);
      z-index: 90;
      margin-top: var(--topbar-h); /* dorong keluar dari bawah topbar fixed */
      background: var(--surface2);
      border-bottom: 1px solid var(--border);
      padding: 10px 16px;
      display: flex;
      gap: 8px;
      align-items: center;
    }
    .rb-searchbar form {
      display: flex;
      gap: 8px;
      width: 100%;
      max-width: 640px;
      margin: 0 auto;
    }
    .rb-search-input {
      flex: 1;
      background: var(--surface3);
      border: 1px solid var(--border2);
      border-radius: 8px;
      color: var(--text);
      font-size: 14px;
      padding: 8px 14px;
      outline: none;
      font-family: inherit;
      transition: border-color .2s;
    }
    .rb-search-input:focus { border-color: var(--rose); }
    .rb-search-input::placeholder { color: var(--text2); }
    .rb-search-btn {
      background: var(--rose);
      border: none;
      border-radius: 8px;
      color: #fff;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 13px;
      font-weight: 600;
      padding: 8px 16px;
      transition: opacity .2s;
      white-space: nowrap;
    }
    .rb-search-btn:hover { opacity: .85; }
    .rb-search-btn svg { width: 16px; height: 16px; flex-shrink: 0; }

    /* ── Grid ── */
    .rb-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 16px;
      padding: 16px;
    }
    @media (max-width: 900px) { .rb-grid { grid-template-columns: repeat(3, 1fr); } }
    @media (max-width: 600px) { .rb-grid { grid-template-columns: repeat(2, 1fr); gap: 10px; padding: 10px; } }

    /* ── Search result heading ── */
    .rb-search-heading {
      color: var(--text2);
      font-size: 13px;
      padding: 12px 16px 4px;
    }
    .rb-search-heading strong { color: var(--text); }
    .rb-search-clear {
      background: none;
      border: 1px solid var(--border2);
      border-radius: 6px;
      color: var(--text2);
      cursor: pointer;
      font-size: 12px;
      padding: 3px 10px;
      margin-left: 8px;
      transition: color .2s, border-color .2s;
    }
    .rb-search-clear:hover { color: var(--text); border-color: var(--surface3); }
    #rbSearchHeading { display: none; }
    #rbSearchHeading.visible { display: flex; align-items: center; gap: 4px; }

    /* ── Pagination: margin atas supaya ada jarak dari grid ── */
    #rbPagination {
      padding: 24px 16px 16px;
      border-top: 1px solid var(--border);
      margin-top: 8px;
    }
  </style>
</head>
<body>

<!-- ─── TOPBAR ─── -->
<header class="topbar">
  <div class="brand ps-wrapper" id="platformSwitcher">
    <button class="ps-trigger" id="psTrigger" aria-haspopup="listbox" aria-expanded="false">
      <div class="brand-icon">
        <img src="/logo.png" alt="Vidorey" class="brand-logo-img" />
      </div>
      <span class="brand-name">Vidorey</span>
      <svg class="ps-chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
        <polyline points="6 9 12 15 18 9"/>
      </svg>
    </button>
    <div class="ps-menu hidden" id="psMenu" role="listbox">
      <a class="ps-item" href="/" role="option">
        <div class="ps-avatar">V</div>
        <div class="ps-info">
          <span class="ps-name">Vidorey 1</span>
          <span class="ps-desc">Folder video · streaming</span>
        </div>
      </a>
      <a class="ps-item ps-active" href="/rb" role="option" aria-selected="true">
        <div class="ps-avatar ps-avatar-rb">R</div>
        <div class="ps-info">
          <span class="ps-name">Vidorey 2</span>
          <span class="ps-desc">Video harian · cari &amp; tonton</span>
        </div>
        <svg class="ps-check" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <polyline points="20 6 9 17 4 12"/>
        </svg>
      </a>
    </div>
  </div>
</header>

<!-- ─── SEARCH BAR ─── -->
<div class="rb-searchbar">
  <form id="rbSearchForm" autocomplete="off">
    <input
      id="rbSearchInput"
      class="rb-search-input"
      type="search"
      placeholder="Cari video…"
      maxlength="150"
    />
    <button type="submit" class="rb-search-btn">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>
      Cari
    </button>
  </form>
</div>

<!-- ─── SHELL ─── -->
<div class="shell">
  <main class="content" id="rbContent">

    <!-- Search heading -->
    <div id="rbSearchHeading" class="rb-search-heading"></div>

    <div id="rbLoadingState" class="state-view hidden">
      <div class="loader"><div class="loader-ring"></div></div>
      <p>Memuat…</p>
    </div>

    <div id="rbErrorState" class="state-view hidden">
      <div class="state-icon error-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/>
          <line x1="12" y1="16" x2="12.01" y2="16"/>
        </svg>
      </div>
      <p id="rbErrorMsg">Terjadi kesalahan.</p>
      <button class="btn-retry" id="rbRetryBtn">Coba lagi</button>
    </div>

    <div id="rbEmptyState" class="state-view hidden">
      <div class="state-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <rect x="2" y="3" width="20" height="14" rx="2"/>
          <line x1="8" y1="21" x2="16" y2="21"/>
          <line x1="12" y1="17" x2="12" y2="21"/>
        </svg>
      </div>
      <p>Tidak ada video ditemukan.</p>
    </div>

    <div id="rbGrid" class="rb-grid"></div>

    <!-- ─── Native Banner Ad ─── -->
    <div class="ad-native-slot">
      <script async="async" data-cfasync="false" src="https://pl28423230.effectivecpmnetwork.com/761a1a8645cd2263043bfeb6f2e87eea/invoke.js"></script>
      <div id="container-761a1a8645cd2263043bfeb6f2e87eea"></div>
    </div>

    <div id="rbPagination" class="pagination hidden"></div>

  </main>
</div>

<!-- ─── PLAYER MODAL ─── -->
<div id="rbPlayerModal" class="modal hidden" role="dialog" aria-modal="true">
  <div class="modal-backdrop" id="rbModalBackdrop"></div>
  <div class="modal-panel">
    <div class="modal-top">
      <div class="modal-meta">
        <h2 id="rbVideoTitle" class="modal-title">—</h2>
        <span id="rbVideoSub" class="modal-sub">Vidorey 2</span>
      </div>
      <button class="modal-close" id="rbModalClose" title="Tutup">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
      </button>
    </div>
    <div class="video-stage rb-video-stage">
      <div id="rbPlayerLoading" class="rb-player-loader">
        <div class="loader-ring"></div>
        <p>Memuat video…</p>
      </div>
      <video
        id="rbVideoEl"
        class="rb-player-video hidden"
        controls
        playsinline
        preload="none"
      ></video>
      <iframe
        id="rbVideoFrame"
        class="rb-player-frame hidden"
        allowfullscreen
        allow="autoplay; fullscreen; picture-in-picture"
        referrerpolicy="no-referrer-when-downgrade"
        frameborder="0"
        scrolling="no"
      ></iframe>
    </div>
  </div>
</div>

<div id="toast" aria-live="polite"></div>

<script src="https://cdn.jsdelivr.net/npm/hls.js@1/dist/hls.min.js"></script>
<script src="/config.js"></script>
<script src="/rb.js"></script>

<!-- ─── Platform Switcher ─── -->
<script>
(function () {
  var trigger = document.getElementById('psTrigger');
  var menu    = document.getElementById('psMenu');
  function open()  { menu.classList.remove('hidden'); trigger.setAttribute('aria-expanded','true'); }
  function close() { menu.classList.add('hidden');    trigger.setAttribute('aria-expanded','false'); }
  trigger.addEventListener('click', function (e) { e.stopPropagation(); menu.classList.contains('hidden') ? open() : close(); });
  document.addEventListener('click', close);
  document.addEventListener('keydown', function (e) { if (e.key === 'Escape') close(); });
})();
</script>

<!-- ─── Adsterra: Popunder ─── -->
<script src="https://pl28418540.effectivecpmnetwork.com/e2/23/51/e223516a3660ad6a4214cb47e436c599.js"></script>
<!-- ─── Adsterra: Social Bar ─── -->

</body>
</html>
